<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Justice Práskač</title>
    <meta name="description" content="Jednoduchý screening českých firem z justice.cz, Sbírky listin a veřejných PDF podkladů.">
    <meta name="theme-color" content="#ffffff">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/praskac-icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link rel="stylesheet" href="/base.css">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body class="bg-slate-50 font-sans text-slate-900 antialiased">
    <a class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[100] focus:px-4 focus:py-2 focus:rounded-lg focus:bg-slate-900 focus:text-white focus:font-semibold" href="#content">Přeskočit na obsah</a>

    <!-- Mobile History Drawer -->
    <div id="history-drawer" class="fixed inset-0 z-50 hidden is-closed" role="dialog">
      <div id="drawer-backdrop" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm"></div>
      <aside class="fixed inset-y-0 left-0 w-[300px] max-w-[85vw] bg-white shadow-2xl flex flex-col">
        <div class="px-4 py-3 border-b border-slate-100">
          <div class="flex items-center justify-between gap-2 mb-3">
            <button id="drawer-home-brand-btn" data-home-trigger="brand" type="button" class="group flex min-w-0 flex-1 items-center gap-2 rounded-xl px-2 py-1.5 text-left transition-all duration-200 hover:bg-slate-50 hover:shadow-sm active:scale-[0.985]" aria-label="Justice Práskač, nové prověření">
              <img src="/praskac-icon.png" alt="Justice Práskač" class="w-7 h-7 rounded-md">
              <span class="truncate font-semibold text-sm tracking-tight text-slate-900 group-hover:text-neutral-700">Práskač</span>
            </button>
            <button id="drawer-close" type="button" class="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <button id="new-check-btn-mobile" data-home-trigger="new-check" type="button" class="new-check-trigger w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50 ring-1 ring-slate-200 transition-all duration-200">
            <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            Nové prověření
          </button>
        </div>
        <div id="drawer-history" class="flex-1 overflow-y-auto p-2 space-y-0.5"></div>
        <div class="px-4 py-3 border-t border-slate-100 text-[11px] text-slate-400 leading-relaxed">
          Veřejná data z justice.cz. Není to právní doporučení.
        </div>
      </aside>
    </div>

    <!-- App Shell -->
    <div id="app-shell" class="flex min-h-screen">
      <!-- Desktop History Rail -->
      <aside id="history-rail" class="hidden lg:flex flex-col w-[260px] flex-shrink-0 border-r border-slate-200/80 bg-white">
        <div class="px-3 pt-4 pb-2">
          <div class="flex items-center px-1">
            <button id="home-brand-btn" data-home-trigger="brand" type="button" class="group flex min-w-0 flex-1 items-center gap-2.5 rounded-2xl px-2 py-2 text-left transition-all duration-200 hover:bg-slate-50 hover:shadow-sm active:scale-[0.985]" aria-label="Justice Práskač, nové prověření">
              <img src="/praskac-icon.png" alt="Justice Práskač" class="w-8 h-8 rounded-lg">
              <div class="min-w-0">
                <div class="truncate font-semibold text-sm text-slate-900 tracking-tight leading-tight group-hover:text-neutral-700">Justice Práskač</div>
                <div class="text-[11px] text-slate-400">Screening českých firem</div>
              </div>
            </button>
          </div>
        </div>
        <div class="px-3 pb-2">
          <button id="new-check-btn" data-home-trigger="new-check" type="button" class="new-check-trigger w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50 ring-1 ring-slate-200 transition-all duration-200">
            <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            Nové prověření
          </button>
        </div>
        <div class="px-3 pb-1">
          <div class="text-[11px] font-medium text-slate-400 uppercase tracking-wider px-1">Historie</div>
        </div>
        <div id="rail-history" class="flex-1 overflow-y-auto px-2 pb-4 space-y-0.5"></div>
        <div class="px-3 py-2.5 border-t border-slate-100 text-[11px] text-slate-400 leading-relaxed">
          Veřejná data z justice.cz.
        </div>
      </aside>

      <!-- Main Column -->
      <div class="flex-1 flex flex-col min-w-0">
        <!-- Sticky Header -->
        <header id="app-header" class="sticky top-0 z-40 h-16 border-b border-slate-200/80 bg-white/95 backdrop-blur-md shadow-sm transition-all duration-200 hidden lg:hidden">
          <div class="grid h-full grid-cols-[44px_1fr_44px] items-center gap-2 px-4">
            <button id="mobile-menu-btn" type="button" class="flex h-11 w-11 items-center justify-center rounded-xl text-slate-500 transition-colors hover:bg-slate-100 hover:text-slate-700" aria-label="Otevřít historii">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
            </button>
            <button id="header-home-brand-btn" data-home-trigger="brand" type="button" class="flex min-w-0 items-center justify-center gap-2.5 rounded-xl px-2 py-2 transition-colors hover:bg-slate-100" aria-label="Justice Práskač, nové prověření">
              <img src="/praskac-icon.png" alt="" class="h-8 w-8 rounded-xl flex-shrink-0">
              <span class="truncate text-sm font-semibold tracking-tight text-slate-900">Justice Práskač</span>
            </button>
            <button id="header-new-check-btn" data-home-trigger="new-check" type="button" class="new-check-trigger flex h-11 w-11 items-center justify-center justify-self-end rounded-xl text-slate-500 transition-all duration-200 hover:bg-slate-100 hover:text-slate-700" aria-label="Nové prověření">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            </button>
            <div class="sr-only">
              <span id="status-text">Připraveno</span>
              <span id="status-dot"></span>
            </div>
          </div>
        </header>

        <!-- Main Content -->
        <main id="content" class="flex-1 min-w-0" tabindex="-1"></main>
      </div>
    </div>
  </body>
</html>
