<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Justice Práskač</title>
    <meta name="description" content="Jednoduchý screening českých firem z justice.cz, Sbírky listin a veřejných PDF podkladů.">
    <meta name="theme-color" content="#fafaf9">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="Justice Práskač">
    <meta property="og:description" content="Jednoduchý screening českých firem z veřejných zdrojů">
    <meta property="og:image" content="https://praskac.xyz/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://praskac.xyz">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Justice Práskač">
    <meta name="twitter:description" content="Jednoduchý screening českých firem z veřejných zdrojů">
    <meta name="twitter:image" content="https://praskac.xyz/og-image.png">
    <link rel="icon" href="/praskac-icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="/praskac-icon-sm.png" as="image">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Space Grotesk', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
            },
            colors: {
              ink: {
                50: '#fafaf9',
                100: '#f5f5f4',
                200: '#e7e5e4',
                300: '#d6d3d1',
                400: '#a8a29e',
                500: '#78716c',
                600: '#57534e',
                700: '#44403c',
                800: '#292524',
                900: '#1c1917',
                950: '#0c0a09',
              },
            },
          },
        },
      }
    </script>
    <link rel="stylesheet" href="/base.css">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body class="bg-ink-50 font-sans text-ink-950">
    <a class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[100] focus:px-4 focus:py-2 focus:bg-ink-900 focus:text-ink-50 focus:font-semibold" href="#content">Přeskočit na obsah</a>

    <!-- Mobile History Drawer -->
    <div id="history-drawer" class="fixed inset-0 z-50 hidden is-closed" role="dialog">
      <div id="drawer-backdrop" class="fixed inset-0 bg-ink-950/30"></div>
      <aside class="fixed inset-y-0 left-0 w-[300px] max-w-[85vw] bg-ink-50 border-r border-ink-900 flex flex-col">
        <div class="px-4 py-3 border-b border-ink-200">
          <div class="flex items-center justify-between gap-2 mb-3">
            <button id="drawer-home-brand-btn" data-home-trigger="brand" type="button" class="group flex min-w-0 flex-1 items-center gap-2 px-2 py-1.5 text-left transition-colors hover:bg-ink-100" aria-label="Justice Práskač, nové prověření">
              <img src="/praskac-icon-sm.png" alt="Justice Práskač" class="w-7 h-7">
              <span class="truncate font-semibold text-sm tracking-tight text-ink-900">Práskač</span>
            </button>
            <button id="drawer-close" type="button" class="flex items-center justify-center w-11 h-11 text-ink-400 hover:text-ink-700" aria-label="Zavřít">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <button id="new-check-btn-mobile" data-home-trigger="new-check" type="button" class="new-check-trigger w-full flex items-center gap-2 px-3 py-2 text-sm font-medium text-ink-700 hover:bg-ink-100 border border-ink-300 transition-colors">
            <svg class="w-4 h-4 text-ink-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            Nové prověření
          </button>
        </div>
        <div id="drawer-history" class="flex-1 overflow-y-auto p-2 space-y-0.5"></div>
        <div class="px-4 py-3 border-t border-ink-200 text-[11px] text-ink-400 font-mono leading-relaxed">
          Pouze z veřejných zdrojů. Nenahrazuje odborné poradenství.
        </div>
      </aside>
    </div>

    <!-- App Shell -->
    <div id="app-shell" class="flex min-h-screen">
      <!-- Desktop History Rail -->
      <aside id="history-rail" class="hidden lg:flex flex-col w-[260px] flex-shrink-0 border-r border-ink-200 bg-ink-50">
        <div class="px-3 pt-4 pb-2">
          <div class="flex items-center px-1">
            <button id="home-brand-btn" data-home-trigger="brand" type="button" class="group flex min-w-0 flex-1 items-center gap-2.5 px-2 py-2 text-left transition-colors hover:bg-ink-100" aria-label="Justice Práskač, nové prověření">
              <img src="/praskac-icon-sm.png" alt="Justice Práskač" class="w-8 h-8">
              <div class="min-w-0">
                <div class="truncate font-bold text-sm text-ink-900 tracking-tight leading-tight">Justice Práskač</div>
                <div class="text-[11px] text-ink-400 font-mono">screening firem</div>
              </div>
            </button>
          </div>
        </div>
        <div class="px-3 pb-2">
          <button id="new-check-btn" data-home-trigger="new-check" type="button" class="new-check-trigger w-full flex items-center gap-2 px-3 py-2 text-sm font-medium text-ink-700 hover:bg-ink-100 border border-ink-300 transition-colors">
            <svg class="w-4 h-4 text-ink-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            Nové prověření
          </button>
        </div>
        <div class="px-3 pb-1">
          <div class="text-[10px] font-mono text-ink-400 uppercase tracking-widest px-1">Historie</div>
        </div>
        <div id="rail-history" class="flex-1 overflow-y-auto px-2 pb-4 space-y-0.5"></div>
        <div class="px-3 py-2.5 border-t border-ink-200 text-[11px] text-ink-400 font-mono leading-relaxed">
          justice.cz · veřejná data
        </div>
      </aside>

      <!-- Main Column -->
      <div class="flex-1 flex flex-col min-w-0">
        <!-- Sticky Header -->
        <header id="app-header" class="sticky top-0 z-40 h-14 border-b border-ink-200 bg-ink-50 transition-all duration-200 hidden lg:hidden">
          <div class="grid h-full grid-cols-[44px_1fr_44px] items-center gap-2 px-4">
            <button id="mobile-menu-btn" type="button" class="flex h-11 w-11 items-center justify-center text-ink-500 transition-colors hover:text-ink-900" aria-label="Otevřít historii">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
            </button>
            <button id="header-home-brand-btn" data-home-trigger="brand" type="button" class="flex min-w-0 items-center justify-center gap-2 px-2 py-2 transition-colors hover:bg-ink-100" aria-label="Justice Práskač, nové prověření">
              <img src="/praskac-icon-sm.png" alt="" class="h-7 w-7 flex-shrink-0">
              <span class="truncate text-sm font-bold tracking-tight text-ink-900">Justice Práskač</span>
            </button>
            <button id="header-new-check-btn" data-home-trigger="new-check" type="button" class="new-check-trigger flex h-11 w-11 items-center justify-center justify-self-end text-ink-500 transition-colors hover:text-ink-900" aria-label="Nové prověření">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            </button>
            <div class="sr-only">
              <span id="status-text">Připraveno</span>
              <span id="status-dot"></span>
            </div>
          </div>
        </header>

        <!-- Main Content -->
        <main id="content" class="flex-1 min-w-0" tabindex="-1"></main>
      </div>
    </div>
  </body>
</html>
